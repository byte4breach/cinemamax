services:

  # ── 1. Java Spring Boot API ─────────────────────────────────────
  - type: web
    name: cinemamax-api
    runtime: docker
    rootDir: java-backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cinemamax-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://byte4breach.github.io

  # ── 2. Python Telegram Bot (web type — worker not on free plan) ──
  - type: web
    name: cinemamax-bot
    runtime: python
    rootDir: python-bot
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_BASE_URL
        value: https://cinemamax-api.onrender.com

# ── PostgreSQL database ─────────────────────────────────────────
databases:
  - name: cinemamax-db
    plan: free
    databaseName: cinema_db
    user: cinemamax
