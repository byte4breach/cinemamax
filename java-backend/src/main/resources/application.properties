# ─────────────────────────────────────────────────────────────────
# CinemaMax – application.properties
# On Render, DATABASE_URL is set automatically as an env variable.
# Locally, you can create a .env file or export the vars manually.
# ─────────────────────────────────────────────────────────────────

spring.application.name=cinemamax-backend

# Database  (Render injects DATABASE_URL automatically)
# Render gives postgres://user:pass@host/db — Spring needs jdbc:postgresql://
# So we override DATABASE_URL in Render env to use postgresql:// prefix
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Run schema.sql on startup to create tables and seed data
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Server port (Render uses PORT env var)
server.port=${PORT:8080}

# CORS – allow requests from your GitHub Pages site and Telegram WebApp
cinemamax.cors.allowed-origins=${CORS_ORIGINS:https://byte4breach.github.io,https://web.telegram.org}
